name: Deploy storymap to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Mapbox token
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          if [ -z "$MAPBOX_TOKEN" ]; then
            echo "MAPBOX_TOKEN secret is empty"; exit 1
          fi
          if ! grep -q '__MAPBOX_TOKEN__' config.js; then
            echo "Placeholder __MAPBOX_TOKEN__ not found in config.js"; exit 1
          fi
          python3 - <<'PY'
          import os, pathlib
          token = os.environ["MAPBOX_TOKEN"]
          path = pathlib.Path("config.js")
          path.write_text(path.read_text(encoding="utf-8").replace("__MAPBOX_TOKEN__", token), encoding="utf-8")
          PY
          grep -c 'accessToken' config.js

      - name: Prepare artifact
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='.env' \
            --exclude='.env.local' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
